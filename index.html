<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MonarxTV Premium</title>
  <meta name="description" content="MonarxTV Premium – bepul va premium kontent platformasi. Kirish va xizmatlardan foydalaning.">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png">

  <!-- Style -->
  <link rel="stylesheet" href="style.css">

  <style>
    /* ================== BASIC RESET ================== */
    * { margin:0; padding:0; box-sizing:border-box; font-family:sans-serif; }
    body { background:#111; color:#fff; }
    img { max-width:100%; display:block; }

    /* ================== LAYOUT ================== */
    .hidden { display:none; }
    #home, #movie { padding:20px; }
    h2 { margin:15px 0; }

    .container { display:flex; gap:12px; overflow-x:auto; padding-bottom:10px; }
    .card { background:#222; border-radius:8px; padding:5px; min-width:120px; cursor:pointer; text-align:center; }
    .card img { border-radius:6px; }
    .card div { margin-top:5px; font-size:14px; }

    #genres span { background:#333; padding:5px 10px; margin-right:8px; border-radius:6px; cursor:pointer; display:inline-block; margin-bottom:5px; }

    /* Shorts */
    #shorts { display:flex; gap:10px; overflow-x:auto; margin-bottom:20px; }
    .short img { width:100px; height:70px; object-fit:cover; border-radius:6px; cursor:pointer; }

    /* Modals */
    .modal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); justify-content:center; align-items:center; z-index:1000; }
    .modal img, .modal iframe { max-width:90%; max-height:90%; border-radius:8px; }
    .modal .back { position:absolute; top:20px; left:20px; cursor:pointer; font-size:18px; color:#fff; }

    /* Buttons */
    button { cursor:pointer; border:none; border-radius:6px; background:#444; color:#fff; padding:5px 10px; margin:3px; }
    button.active { background:#00aaff; }

    /* Search */
    #searchResults .actor-card, #searchResults .card { margin-bottom:10px; }

    /* Premiere Slider */
    #premieres { overflow:hidden; position:relative; margin-bottom:20px; }
    #premieres-inner { display:flex; transition: transform 0.4s ease; gap:12px; }
    .premiere-nav-btn { position:absolute; top:50%; transform:translateY(-50%); background: rgba(0,0,0,0.5); color:#fff; border:none; padding:6px 10px; border-radius:6px; cursor:pointer; z-index:10; }
    .prev-btn{left:5px;} .next-btn{right:5px;}
  </style>
</head>
<body>

  <!-- ===== HOME PAGE ===== -->
  <div id="home">
    <h2>Premieres</h2>
    <div id="premieres">
      <div id="premieres-inner"></div>
    </div>

    <h2>Movies</h2>
    <div class="container" id="movies"></div>
    <button id="allMoviesBtn">Barchasi</button>

    <h2>Series</h2>
    <div class="container" id="series"></div>
    <button id="allSeriesBtn">Barchasi</button>

    <h2>Anime</h2>
    <div class="container" id="anime"></div>
    <button id="allAnimeBtn">Barchasi</button>

    <h2>Genres</h2>
    <div id="genres"></div>

    <h2>Shorts</h2>
    <div id="shorts"></div>

    <button id="searchBtn">Qidirish</button>
  </div>

  <!-- ===== MOVIE PAGE ===== -->
  <div id="movie" class="hidden">
    <button onclick="goHome()">← Orqaga</button>
    <h1 id="movie-title"></h1>
    <p id="movie-genre"></p>
    <p id="movie-desc"></p>

    <video id="player" width="100%" height="400" controls></video>

    <div id="episodes"></div>
    <h3>Actors</h3>
    <div id="movie-actors" class="container"></div>

    <h3>Images</h3>
    <div id="movie-images" class="container"></div>
  </div>

  <!-- ===== SHORT MODAL ===== -->
  <div id="shortModal" class="modal"></div>

  <!-- ===== ACTOR MODAL ===== -->
  <div id="actorModal" class="modal">
    <img id="actorModalImg" style="border-radius:8px; max-width:150px; margin-bottom:10px;">
    <h3 id="actorModalName"></h3>
    <div id="actorMovies" class="container"></div>
    <button id="closeActorModal">Close</button>
  </div>

  <!-- ===== LIST MODAL ===== -->
  <div id="listModal" class="modal">
    <div id="listModalContent" class="container" style="flex-wrap:wrap; max-height:80%; overflow-y:auto;"></div>
  </div>

  <!-- ===== SEARCH MODAL ===== -->
  <div id="searchModal" class="modal">
    <input type="text" id="searchInput" placeholder="Qidirish..." style="padding:10px; width:90%; max-width:400px; border-radius:6px; margin-bottom:10px;">
    <div id="searchResults" class="container" style="flex-direction:column;"></div>
  </div>

  <!-- ===== IMAGE MODAL ===== -->
  <div id="imageModal" class="modal">
    <img id="modalImg">
    <span id="closeImgModal" style="position:absolute; top:20px; right:30px; font-size:30px; color:#fff; cursor:pointer;">&times;</span>
  </div>

  <!-- ===== MOVIES DATA ===== -->
  <script src="moviesData.js"></script>

  <!-- ===== MAIN JS ===== -->
  <script src="index.js"></script>
</body>
</html>
